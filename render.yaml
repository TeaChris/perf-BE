services:
        - type: web
          name: performance-api
          env: node
          plan: free
          buildCommand: npm install && npm run build
          startCommand: npm run start
          envVars:
                  - key: NODE_ENV
                    value: production
                  - key: PORT
                    value: 5000
                  - key: MONGODB_URI
                    sync: false
                  - key: REDIS_URL
                    sync: false
                  - key: JWT_ACCESS_KEY
                    sync: false
                  - key: JWT_REFRESH_KEY
                    sync: false
                  - key: RESEND_API_KEY
                    sync: false
                  - key: ALLOWED_ORIGINS
                    sync: false
